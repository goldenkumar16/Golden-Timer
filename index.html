<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .timer-container { 
            background-color: #212529; 
            border-radius: 24px; 
            padding: 2rem 1rem; 
            position: relative; 
            width: 100%;
        }

        .timer-text { 
            font-family: 'Inter', sans-serif; 
            font-weight: 800; 
            color: #00d2ff; 
            font-size: clamp(3.5rem, 15vw, 5.5rem); 
            line-height: 1; 
            text-align: center; 
        }

        .cycle-pill { 
            background-color: #ff9f00; 
            color: white; 
            padding: 4px 10px; 
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 0.7rem; 
            position: absolute; 
            top: 12px; 
            right: 12px; 
        }
        
        .btn-grey { background-color: #adb5bd; color: white; font-weight: 700; border-radius: 16px; }
        .btn-slate { background-color: #495057; color: white; font-weight: 700; border-radius: 12px; }
        .btn-dark { background-color: #212529; color: white; font-weight: 800; border-radius: 16px; }
        .btn-red { background-color: #e11d48; color: white; font-weight: 900; border-radius: 20px; }
        
        .step-btn { 
            border-radius: 20px; 
            padding: 1.25rem 0.75rem; 
            text-align: center; 
            font-weight: 900; 
            font-size: 0.8rem; 
            line-height: 1.2; 
            text-transform: uppercase; 
            transition: all 0.2s; 
            border: 4px solid transparent; 
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step-btn-inactive { 
            background-color: #FFB300; 
            color: #000000; 
            box-shadow: 0 5px 0px #cc8e00; 
        }

        .step-btn-active { 
            background-color: #22c55e; 
            color: white; 
            border-color: #166534; 
            box-shadow: 0 4px 0px #166534; 
            animation: pulse-active 1.5s infinite; 
        }
        
        .step-btn-recorded { 
            background-color: #15803d; 
            color: white; 
            border-color: #14532d; 
            opacity: 0.85; 
        }

        @keyframes pulse-active {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
            100% { transform: scale(1); }
        }
        
        .hidden { display: none; }

        .bold-label {
            color: #000000 !important;
            font-weight: 900 !important;
        }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6 flex flex-col items-center">

    <!-- PAGE 1: SETUP -->
    <div id="setupPage" class="w-full max-w-[500px] bg-slate-50 border border-slate-200 rounded-[2.5rem] p-6 md:p-8 shadow-sm my-auto">
        <h1 class="text-4xl font-black text-blue-900 mb-8 text-center uppercase tracking-tight">Golden Timer</h1>
        
        <div class="space-y-6">
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] bold-label uppercase mb-1">Equipment ID</label>
                        <input type="text" id="setupEqId" class="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none text-black font-bold focus:border-black transition text-sm" placeholder="ID">
                    </div>
                    <div>
                        <label class="block text-[11px] bold-label uppercase mb-1">Staff ID</label>
                        <input type="text" id="setupStaffId" class="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none text-black font-bold focus:border-black transition text-sm" placeholder="Staff">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] bold-label uppercase mb-1">Process Title</label>
                    <input type="text" id="setupJob" class="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none text-black font-bold focus:border-black transition text-sm" placeholder="Process Name">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-200">
                <label class="block text-[14px] bold-label uppercase mb-3">Add Steps <span class="text-blue-600">*</span></label>
                <div class="flex flex-nowrap gap-2 mb-4 w-full">
                    <input type="text" id="setupStepInput" class="flex-1 min-w-0 p-3 bg-white border border-slate-300 rounded-xl outline-none text-black font-bold text-sm" placeholder="Step name...">
                    <button onclick="addStepFromSetup()" class="shrink-0 bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm active:scale-95 transition">Add</button>
                </div>
                <div id="setupStepsList" class="space-y-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar"></div>
            </div>

            <button onclick="goToTimerPage()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-900 active:scale-[0.98] transition shadow-lg uppercase tracking-wider mt-2">
                Done - Open Timer
            </button>
        </div>
    </div>

    <!-- PAGE 2: TIMER -->
    <div id="timerPage" class="w-full max-w-[500px] hidden space-y-4">
        
        <div class="flex justify-between items-center mb-1">
            <button onclick="goHome()" class="flex items-center gap-1 text-slate-500 font-bold hover:text-slate-800 transition text-xs">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                HOME
            </button>
            <div id="currentDateDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest"></div>
        </div>

        <div class="timer-container shadow-2xl">
            <div class="cycle-pill uppercase">Cycles: <span id="cycleCount">0</span></div>
            <div id="mainTimer" class="timer-text">0.00</div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button id="pauseBtn" onclick="togglePause()" class="btn-grey py-4 flex items-center justify-center gap-2 text-md uppercase tracking-wider active:scale-95 transition">
                Pause
            </button>
            <button id="waitBtn" onclick="toggleWaiting()" class="btn-grey py-4 flex items-center justify-center gap-2 text-md uppercase tracking-wider active:scale-95 transition">
                Waiting
            </button>
        </div>

        <!-- Dual Reset Buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="undoLastCycle()" class="btn-slate py-4 text-[10px] uppercase font-black active:scale-95 transition text-center px-1">
                Reset Last Cycle
            </button>
            <button onclick="resetFull()" class="btn-slate py-4 text-[10px] uppercase font-black active:scale-95 transition text-center px-1 bg-slate-600">
                Reset Full
            </button>
        </div>

        <div id="stepGrid" class="grid grid-cols-2 gap-3 pt-2">
            <!-- Buttons generated dynamically -->
        </div>

        <button id="stopCycleBtn" onclick="stopCycle()" class="btn-red w-full py-6 text-2xl uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition hidden">
            STOP & RECORD
        </button>

        <button onclick="downloadReport()" class="btn-dark w-full py-5 text-lg uppercase tracking-widest mt-6 shadow-xl active:scale-95 transition">
            Download Report (CSV)
        </button>

        <div id="sessionStatus" class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest py-3">
            Waiting - Click Step 1
        </div>
    </div>

    <!-- Success Modal -->
    <div id="recordModal" class="fixed inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm z-50 hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center scale-90 transition-all duration-300 mx-4 w-full max-w-sm" id="modalContent">
            <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase" id="successMsg">Cycle Recorded!</h2>
            <p class="text-slate-500 font-bold uppercase text-xs mt-2">Ready for next cycle</p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-red-600 text-white rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest hidden z-50">
        Last Cycle Deleted
    </div>

    <!-- Alert Box -->
    <div id="alertBox" class="fixed inset-0 flex items-center justify-center bg-black/50 z-50 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-xs w-full text-center">
            <p id="alertText" class="text-sm font-bold text-slate-800 mb-4"></p>
            <button onclick="closeAlert()" class="w-full py-2 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase">OK</button>
        </div>
    </div>

    <!-- Confirm Box -->
    <div id="confirmBox" class="fixed inset-0 flex items-center justify-center bg-black/50 z-50 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-xs w-full text-center">
            <p id="confirmText" class="text-sm font-bold text-slate-800 mb-4"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm(false)" class="flex-1 py-2 bg-slate-200 text-slate-800 rounded-xl font-bold text-xs uppercase">Cancel</button>
                <button onclick="closeConfirm(true)" class="flex-1 py-2 bg-red-600 text-white rounded-xl font-bold text-xs uppercase">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let steps = [];
        let cycleResults = [];
        let currentCycleData = {};
        let config = { eqId: '', staffId: '', job: '' };
        
        let isRunning = false;
        let isPaused = false;
        let isWaiting = false;

        let activeStepIndex = -1;
        let accumulatedStepTime = 0;
        let lastTimestamp = 0;
        let cycleWaitTime = 0;
        let timerInterval = null;
        let confirmCallback = null;

        const setupPage = document.getElementById('setupPage');
        const timerPage = document.getElementById('timerPage');
        const mainTimer = document.getElementById('mainTimer');
        const setupStepsList = document.getElementById('setupStepsList');
        const stepGrid = document.getElementById('stepGrid');
        const stopCycleBtn = document.getElementById('stopCycleBtn');
        const cycleCountDisplay = document.getElementById('cycleCount');
        const statusLabel = document.getElementById('sessionStatus');
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const toast = document.getElementById('toast');
        const alertBox = document.getElementById('alertBox');
        const alertText = document.getElementById('alertText');
        const confirmBox = document.getElementById('confirmBox');
        const confirmText = document.getElementById('confirmText');

        function showAlert(msg) {
            alertText.innerText = msg;
            alertBox.classList.remove('hidden');
        }

        function closeAlert() {
            alertBox.classList.add('hidden');
        }

        function showConfirm(msg, callback) {
            confirmText.innerText = msg;
            confirmCallback = callback;
            confirmBox.classList.remove('hidden');
        }

        function closeConfirm(result) {
            confirmBox.classList.add('hidden');
            if (result && confirmCallback) confirmCallback();
            confirmCallback = null;
        }

        function addStepFromSetup() {
            const input = document.getElementById('setupStepInput');
            const name = input.value.trim();
            if (!name) return;
            steps.push(name);
            input.value = '';
            renderSetupSteps();
        }

        function renderSetupSteps() {
            setupStepsList.innerHTML = steps.map((name, idx) => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-200">
                    <span class="font-black text-blue-500 mr-2 w-6 text-xs">#${idx + 1}</span>
                    <span class="flex-1 font-bold text-slate-700 truncate text-xs uppercase">${name}</span>
                    <button onclick="removeStep(${idx})" class="text-slate-300 hover:text-red-500 p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            `).join('');
        }

        function removeStep(idx) {
            steps.splice(idx, 1);
            renderSetupSteps();
        }

        function goToTimerPage() {
            config.eqId = document.getElementById('setupEqId').value.trim();
            config.staffId = document.getElementById('setupStaffId').value.trim();
            config.job = document.getElementById('setupJob').value.trim();

            if (steps.length === 0) {
                showAlert("Please add at least one step.");
                return;
            }

            renderStepGrid();
            currentDateDisplay.innerText = new Date().toLocaleDateString();
            setupPage.classList.add('hidden');
            timerPage.classList.remove('hidden');
        }

        function goHome() {
            stopTimer();
            timerPage.classList.add('hidden');
            setupPage.classList.remove('hidden');
        }

        function renderStepGrid() {
            stepGrid.innerHTML = steps.map((name, idx) => `
                <button id="step-btn-${idx}" onclick="recordStep(${idx})" class="step-btn step-btn-inactive shadow-md">
                    <span class="line-clamp-2">${idx + 1}. ${name}</span>
                </button>
            `).join('');
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            lastTimestamp = Date.now();
            timerInterval = setInterval(tick, 10);
            isRunning = true;
            statusLabel.innerText = "RECORDING...";
            statusLabel.className = "text-center text-[10px] font-black text-green-500 uppercase tracking-widest py-3";
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            activeStepIndex = -1;
            stopCycleBtn.classList.add('hidden');
            statusLabel.innerText = "READY - CLICK STEP 1";
            statusLabel.className = "text-center text-[10px] font-black text-slate-400 uppercase tracking-widest py-3";
        }

        function tick() {
            if (isPaused) return;
            const now = Date.now();
            const delta = now - lastTimestamp;
            lastTimestamp = now;

            if (!isWaiting) {
                accumulatedStepTime += delta;
            } else {
                cycleWaitTime += delta;
            }
            
            mainTimer.innerText = (accumulatedStepTime / 1000).toFixed(2);
        }

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            if (isPaused) {
                btn.classList.replace('btn-grey', 'btn-dark');
                btn.innerHTML = "Resume";
            } else {
                lastTimestamp = Date.now();
                btn.classList.replace('btn-dark', 'btn-grey');
                btn.innerHTML = "Pause";
            }
        }

        function toggleWaiting() {
            if (!isRunning || isPaused) return;
            isWaiting = !isWaiting;
            const btn = document.getElementById('waitBtn');
            if (isWaiting) {
                btn.classList.replace('btn-grey', 'btn-dark');
                btn.classList.add('animate-pulse');
            } else {
                btn.classList.replace('btn-dark', 'btn-grey');
                btn.classList.remove('animate-pulse');
            }
        }

        function undoLastCycle(silent = false) {
            const hasHistory = cycleResults.length > 0;
            const hasCurrentProgress = Object.keys(currentCycleData).length > 0 || isRunning;

            if (!hasHistory && !hasCurrentProgress) {
                if (!silent) showAlert("Nothing to reset.");
                return;
            }

            const executeUndo = () => {
                if (hasHistory) {
                    cycleResults.pop();
                    cycleCountDisplay.innerText = cycleResults.length;
                    if (!silent) {
                        toast.classList.remove('hidden');
                        setTimeout(() => toast.classList.add('hidden'), 2000);
                    }
                }

                currentCycleData = {};
                accumulatedStepTime = 0;
                cycleWaitTime = 0;
                mainTimer.innerText = "0.00";
                
                steps.forEach((_, i) => {
                    const b = document.getElementById(`step-btn-${i}`);
                    if(b) b.className = 'step-btn step-btn-inactive shadow-md';
                });

                stopTimer();
                isPaused = false;
                isWaiting = false;
                document.getElementById('pauseBtn').classList.replace('btn-dark', 'btn-grey');
                document.getElementById('pauseBtn').innerHTML = "Pause";
                document.getElementById('waitBtn').classList.replace('btn-dark', 'btn-grey');
                document.getElementById('waitBtn').innerHTML = "Waiting";
            };

            if (silent) {
                executeUndo();
            } else {
                showConfirm("Delete last cycle and reset progress?", executeUndo);
            }
        }

        function resetFull() {
            if (cycleResults.length === 0 && !isRunning) {
                showAlert("No data to erase.");
                return;
            }
            showConfirm("Are you sure you want to erase ALL study data? This cannot be undone.", () => {
                cycleResults = [];
                cycleCountDisplay.innerText = "0";
                undoLastCycle(true);
                showAlert("All data cleared.");
            });
        }

        function recordStep(idx) {
            if (!isRunning) {
                if (idx !== 0) return showAlert("Click Step 1 to start.");
                startTimer();
                activeStepIndex = 0;
                updateStepVisuals();
                stopCycleBtn.classList.remove('hidden');
                return;
            }
            
            if (isPaused || isWaiting) return;
            if (currentCycleData[idx] !== undefined) return;
            if (idx === activeStepIndex) return;

            if (idx !== activeStepIndex + 1) return showAlert(`Follow the order: Step ${activeStepIndex + 2}`);

            currentCycleData[activeStepIndex] = accumulatedStepTime / 1000;
            accumulatedStepTime = 0;
            mainTimer.innerText = "0.00";
            activeStepIndex = idx;
            updateStepVisuals();
        }

        function updateStepVisuals() {
            steps.forEach((_, i) => {
                const b = document.getElementById(`step-btn-${i}`);
                b.className = 'step-btn shadow-md';
                if (i === activeStepIndex) b.classList.add('step-btn-active');
                else if (currentCycleData[i] !== undefined) b.classList.add('step-btn-recorded');
                else b.classList.add('step-btn-inactive');
            });
        }

        function stopCycle() {
            if (!isRunning) return;

            // Direct record without confirmation pop-up
            currentCycleData[activeStepIndex] = accumulatedStepTime / 1000;

            const netTotal = Object.values(currentCycleData).reduce((a, b) => a + b, 0);
            const waitTotal = cycleWaitTime / 1000;
            const now = new Date();
            
            cycleResults.push({
                cycle: cycleResults.length + 1,
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString(),
                stepResults: { ...currentCycleData },
                netTotal: netTotal,
                waitTime: waitTotal,
                grossTotal: netTotal + waitTotal
            });

            finishAndShowSuccess();
        }

        function finishAndShowSuccess() {
            stopTimer();
            
            const modal = document.getElementById('recordModal');
            const content = document.getElementById('modalContent');
            document.getElementById('successMsg').innerText = `CYCLE ${cycleResults.length} OK!`;
            
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-90', 'scale-100'), 10);
            
            currentCycleData = {};
            cycleWaitTime = 0;
            cycleCountDisplay.innerText = cycleResults.length;
            mainTimer.innerText = "0.00";
            
            setTimeout(() => {
                steps.forEach((_, i) => {
                    const b = document.getElementById(`step-btn-${i}`);
                    if(b) b.className = 'step-btn step-btn-inactive shadow-md';
                });
                content.classList.replace('scale-100', 'scale-90');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }, 1200);
        }

        function downloadReport() {
            if (cycleResults.length === 0) return showAlert("No data collected.");

            let csvRows = [];
            csvRows.push(`"Equipment ID","${config.eqId || 'N/A'}"`);
            csvRows.push(`"Staff ID","${config.staffId || 'N/A'}"`);
            csvRows.push(`"Process Title","${config.job || 'N/A'}"`);
            csvRows.push("");

            let headers = ["Cycle #", "Date", "End Time"];
            steps.forEach(s => headers.push(`"${s} (s)"`));
            headers.push("Waiting Time (s)", "Net Total (s)", "Gross Total (s)");
            csvRows.push(headers.join(","));

            cycleResults.forEach(r => {
                let row = [r.cycle, `"${r.date}"`, `"${r.time}"` ];
                steps.forEach((_, i) => row.push((r.stepResults[i] || 0).toFixed(2)));
                row.push(r.waitTime.toFixed(2), r.netTotal.toFixed(2), r.grossTotal.toFixed(2));
                csvRows.push(row.join(","));
            });

            const nets = cycleResults.map(r => r.netTotal);
            const gross = cycleResults.map(r => r.grossTotal);
            const wait = cycleResults.map(r => r.waitTime);
            const avg = a => (a.reduce((x, y) => x + y, 0) / a.length).toFixed(2);
            const med = a => {
                const s = [...a].sort((x, y) => x - y);
                const m = Math.floor(s.length / 2);
                return s.length % 2 !== 0 ? s[m] : (s[m-1]+s[m])/2;
            };

            csvRows.push("", "SUMMARY STATISTICS");
            csvRows.push(`"Total Cycles Recorded","${cycleResults.length}"`);
            csvRows.push(`"Avg Net Cycle Time (s)","${avg(nets)}"`);
            csvRows.push(`"Avg Gross Cycle Time (s)","${avg(gross)}"`);
            csvRows.push(`"Avg Waiting Time (s)","${avg(wait)}"`);
            csvRows.push(`"Median Net Cycle Time (s)","${med(nets).toFixed(2)}"`);

            const blob = new Blob(["\ufeff" + csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Golden_Timer_Report.csv`;
            link.click();
        }
    </script>
</body>
</html>
